<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rubik's Cube | Multi-Size | Smart Controls</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', sans-serif;
            background: #0a0a2a;
        }
        /* --- Selection Screen (Cube Size + Mode) --- */
        .selection-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, #12122e, #03030f);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            transition: opacity 0.4s ease;
            overflow-y: auto;
            padding: 20px;
        }
        .selection-card {
            background: rgba(18, 18, 35, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 32px 40px;
            text-align: center;
            border: 1px solid rgba(255, 160, 80, 0.5);
            box-shadow: 0 25px 45px rgba(0,0,0,0.6);
            max-width: 550px;
            width: 100%;
        }
        .selection-card h1 {
            color: white;
            font-size: 2rem;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #ffbc6e, #ff6e3a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            color: #aaa;
            margin-bottom: 28px;
            font-size: 0.85rem;
        }
        .cube-options {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .cube-size-btn {
            background: #2a2a4a;
            border: none;
            padding: 14px 28px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            min-width: 100px;
            border-bottom: 3px solid #ff8c42;
        }
        .cube-size-btn.active {
            background: linear-gradient(135deg, #ff8c42, #e65c1e);
            box-shadow: 0 0 15px rgba(255,140,66,0.5);
            border-bottom-color: white;
        }
        .mode-selector {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 32px;
        }
        .mode-choice {
            background: #232345;
            border: none;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            color: #ddd;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-choice.selected {
            background: #3a6ea5;
            color: white;
            box-shadow: 0 0 12px rgba(58,110,165,0.6);
        }
        .start-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            padding: 14px 38px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            width: 80%;
        }
        /* --- Game UI --- */
        .game-container {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }
        .top-bar {
            position: fixed;
            top: 18px;
            left: 18px;
            right: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 200;
            pointer-events: none;
        }
        .status-badge {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 40px;
            color: #f0f0f0;
            font-size: 13px;
            font-weight: 500;
            font-family: monospace;
            border-left: 3px solid #ff8c42;
            pointer-events: auto;
        }
        .home-btn {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            font-size: 14px;
            pointer-events: auto;
            transition: 0.2s;
            border: 1px solid rgba(255,140,66,0.6);
        }
        .home-btn:active {
            transform: scale(0.95);
            background: #ff8c42;
        }
        .mix-wrapper {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 180;
        }
        .mix-btn {
            pointer-events: auto;
            background: linear-gradient(135deg, #ff7e3a, #e65c1e);
            border: none;
            color: white;
            font-weight: bold;
            padding: 14px 34px;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.45);
            font-family: inherit;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        /* PC Panel */
        .pc-panel {
            position: fixed;
            bottom: 24px;
            right: 20px;
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 12px 20px;
            color: #eee;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            pointer-events: none;
            z-index: 170;
            border-right: 3px solid #ff9f4a;
            text-align: right;
            line-height: 1.6;
        }
        .key {
            display: inline-block;
            background: #1e1e2e;
            border-radius: 8px;
            padding: 2px 8px;
            margin: 0 2px;
            color: #ffb46e;
            border: 1px solid #5a5a7a;
        }
        /* Mobile Panel */
        .mobile-panel {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 12px 18px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(24px);
            border-radius: 60px;
            pointer-events: auto;
            z-index: 160;
            max-width: 94vw;
            border: 1px solid rgba(255,140,66,0.5);
        }
        .touch-btn {
            background: rgba(25, 25, 45, 0.95);
            border: none;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 8px 14px;
            min-width: 55px;
            border-radius: 44px;
            cursor: pointer;
            border-bottom: 2px solid #ff8c42;
        }
        .touch-btn:active {
            transform: scale(0.92);
            background: #ff8c42;
        }
        .hidden { display: none !important; }
        @media (max-width: 650px) {
            .cube-size-btn { padding: 10px 18px; font-size: 1rem; min-width: 70px; }
            .mobile-panel { gap: 6px; bottom: 90px; }
            .touch-btn { padding: 6px 10px; min-width: 48px; font-size: 0.7rem; }
            .mix-btn { padding: 10px 24px; font-size: 0.9rem; }
        }
        button { touch-action: manipulation; }
    </style>
</head>
<body>
    <!-- Selection Screen: Cube Size + Mode -->
    <div id="selection-screen" class="selection-screen">
        <div class="selection-card">
            <h1>🧩 RUBIK'S CUBE</h1>
            <div class="sub">choose your challenge</div>
            <div class="cube-options">
                <button data-size="3" class="cube-size-btn active">3x3</button>
                <button data-size="4" class="cube-size-btn">4x4</button>
                <button data-size="5" class="cube-size-btn">5x5</button>
            </div>
            <div class="mode-selector">
                <button data-mode="pc" class="mode-choice selected">💻 PC / Keyboard</button>
                <button data-mode="mobile" class="mode-choice">📱 Mobile / Touch</button>
            </div>
            <button id="confirm-start" class="start-btn">🚀 START CUBE</button>
        </div>
    </div>

    <!-- Game Container -->
    <div id="game-container" class="game-container">
        <div class="top-bar">
            <div class="status-badge" id="status-label">✨ READY</div>
            <button id="home-button" class="home-btn">🏠 BACK TO HOME</button>
        </div>
        <div class="mix-wrapper">
            <button id="mix-cube-btn" class="mix-btn">🔀 AUTO MIX & SHUFFLE</button>
        </div>
        <div id="pc-panel" class="pc-panel hidden">
            <div>⌨️ <strong>KEYS</strong> &nbsp; <span class="key">U</span>/<span class="key">⇧+U</span> &nbsp; <span class="key">D</span>/<span class="key">⇧+D</span></div>
            <div><span class="key">L</span>/<span class="key">⇧+L</span> &nbsp; <span class="key">R</span>/<span class="key">⇧+R</span> &nbsp; <span class="key">F</span>/<span class="key">⇧+F</span> &nbsp; <span class="key">B</span>/<span class="key">⇧+B</span></div>
            <div style="font-size:9px; opacity:0.6;">🖱️ drag to orbit</div>
        </div>
        <div id="mobile-panel" class="mobile-panel hidden">
            <button class="touch-btn" data-move="U">U ↑</button>
            <button class="touch-btn" data-move="U'">U' ↓</button>
            <button class="touch-btn" data-move="D">D ↓</button>
            <button class="touch-btn" data-move="D'">D' ↑</button>
            <button class="touch-btn" data-move="L">L ←</button>
            <button class="touch-btn" data-move="L'">L' →</button>
            <button class="touch-btn" data-move="R">R →</button>
            <button class="touch-btn" data-move="R'">R' ←</button>
            <button class="touch-btn" data-move="F">F ↺</button>
            <button class="touch-btn" data-move="F'">F' ↻</button>
            <button class="touch-btn" data-move="B">B ↻</button>
            <button class="touch-btn" data-move="B'">B' ↺</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ---------- GLOBALS ----------
        let scene, camera, renderer, controls;
        let cubelets = [];       // all small pieces
        let rotating = false;
        let currentMode = null;   // 'pc' or 'mobile'
        let currentSize = 3;      // 3,4,5
        let mixActive = false;
        let mixTimeout = null;
        
        // Color mapping (classic vivid)
        const materialMap = {
            right: new THREE.MeshStandardMaterial({ color: 0xff8c42, roughness: 0.25, metalness: 0.05 }),
            left: new THREE.MeshStandardMaterial({ color: 0xc41e3a, roughness: 0.25, metalness: 0.05 }),
            up: new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.3, metalness: 0.02 }),
            down: new THREE.MeshStandardMaterial({ color: 0xf3d03e, roughness: 0.28, metalness: 0.05 }),
            front: new THREE.MeshStandardMaterial({ color: 0x2ecc71, roughness: 0.3, metalness: 0.05 }),
            back: new THREE.MeshStandardMaterial({ color: 0x3498db, roughness: 0.28, metalness: 0.05 })
        };
        const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
        
        // Helper: get material array for a piece at (x,y,z) with given size offset range
        function getMaterialsForPiece(x, y, z, size) {
            const limit = (size - 1) / 2;
            const isRight = (x === limit);
            const isLeft = (x === -limit);
            const isUp = (y === limit);
            const isDown = (y === -limit);
            const isFront = (z === limit);
            const isBack = (z === -limit);
            return [
                isRight ? materialMap.right : blackMat,
                isLeft ? materialMap.left : blackMat,
                isUp ? materialMap.up : blackMat,
                isDown ? materialMap.down : blackMat,
                isFront ? materialMap.front : blackMat,
                isBack ? materialMap.back : blackMat
            ];
        }
        
        // Build cube of given size (3,4,5)
        function buildCubeOfSize(size) {
            const offset = (size - 1) / 2;   // 1 for 3x3, 1.5 for 4x4, 2 for 5x5
            const step = 1;
            const pieceSize = 0.94;   // slight gap
            const start = -offset;
            const end = offset;
            
            for (let x = start; x <= end + 0.1; x += step) {
                for (let y = start; y <= end + 0.1; y += step) {
                    for (let z = start; z <= end + 0.1; z += step) {
                        const rx = Math.round(x * 10) / 10;
                        const ry = Math.round(y * 10) / 10;
                        const rz = Math.round(z * 10) / 10;
                        const materials = getMaterialsForPiece(rx, ry, rz, size);
                        const geometry = new THREE.BoxGeometry(pieceSize, pieceSize, pieceSize);
                        const mesh = new THREE.Mesh(geometry, materials);
                        mesh.position.set(rx, ry, rz);
                        mesh.castShadow = true;
                        mesh.userData = { x: rx, y: ry, z: rz };
                        scene.add(mesh);
                        cubelets.push(mesh);
                    }
                }
            }
        }
        
        // Clear existing cube
        function clearCube() {
            cubelets.forEach(c => {
                if (c.parent) scene.remove(c);
            });
            cubelets = [];
        }
        
        // Rotation core (generic axis/layer)
        function rotateLayer(axis, layerValue, dir) {
            return new Promise((resolve) => {
                if (rotating) { resolve(false); return; }
                const toRotate = cubelets.filter(c => Math.abs(c.userData[axis] - layerValue) < 0.2);
                if (toRotate.length === 0) { resolve(false); return; }
                rotating = true;
                const group = new THREE.Group();
                scene.add(group);
                toRotate.forEach(cube => group.attach(cube));
                let accum = 0;
                const target = Math.PI / 2;
                const step = 0.12 * dir;
                function animateRot() {
                    if (!rotating) return;
                    group.rotation[axis] += step;
                    accum += Math.abs(step);
                    if (accum >= target) {
                        group.rotation[axis] = dir === 1 ? Math.PI / 2 : -Math.PI / 2;
                        toRotate.forEach(cube => {
                            scene.attach(cube);
                            const pos = cube.position.clone().round();
                            cube.position.set(pos.x, pos.y, pos.z);
                            cube.userData.x = pos.x;
                            cube.userData.y = pos.y;
                            cube.userData.z = pos.z;
                        });
                        scene.remove(group);
                        rotating = false;
                        resolve(true);
                        return;
                    }
                    requestAnimationFrame(animateRot);
                }
                animateRot();
            });
        }
        
        // Perform move based on notation (U, U', D, D', etc)
        async function performMove(moveCode) {
            if (rotating) return false;
            let axis, layer, dir;
            const prime = moveCode.includes("'");
            const base = moveCode[0];
            const limit = (currentSize - 1) / 2;
            switch(base) {
                case 'U': axis = 'y'; layer = limit; dir = prime ? -1 : 1; break;
                case 'D': axis = 'y'; layer = -limit; dir = prime ? 1 : -1; break;
                case 'L': axis = 'x'; layer = -limit; dir = prime ? 1 : -1; break;
                case 'R': axis = 'x'; layer = limit; dir = prime ? -1 : 1; break;
                case 'F': axis = 'z'; layer = limit; dir = prime ? -1 : 1; break;
                case 'B': axis = 'z'; layer = -limit; dir = prime ? 1 : -1; break;
                default: return false;
            }
            await rotateLayer(axis, layer, dir);
            return true;
        }
        
        // Auto Mix Sequence (random moves)
        async function startAutoMix() {
            if (mixActive) {
                mixActive = false;
                if (mixTimeout) clearTimeout(mixTimeout);
                await new Promise(r => setTimeout(r, 100));
            }
            mixActive = true;
            const movesList = ['U', "U'", 'D', "D'", 'L', "L'", 'R', "R'", 'F', "F'", 'B', "B'"];
            let moveIndex = 0;
            const totalMoves = 36;
            const statusDiv = document.getElementById('status-label');
            if (statusDiv) statusDiv.innerText = "🌀 MIXING CUBE...";
            async function applyNext() {
                if (!mixActive) return;
                if (moveIndex >= totalMoves) {
                    mixActive = false;
                    if (statusDiv) statusDiv.innerText = "🎲 SHUFFLED! READY TO PLAY";
                    return;
                }
                const randomMove = movesList[Math.floor(Math.random() * movesList.length)];
                await performMove(randomMove);
                moveIndex++;
                if (mixActive && moveIndex < totalMoves) {
                    mixTimeout = setTimeout(applyNext, 80);
                } else if (moveIndex >= totalMoves) {
                    mixActive = false;
                    if (statusDiv) statusDiv.innerText = "✅ MIX COMPLETE | PLAY!";
                }
            }
            applyNext();
        }
        
        function triggerMix() {
            if (rotating) return;
            startAutoMix();
        }
        
        // ---------- 3D Scene Setup ----------
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x070b1c);
            scene.fog = new THREE.FogExp2(0x070b1c, 0.007);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            const distance = currentSize === 3 ? 6 : (currentSize === 4 ? 7.2 : 8.5);
            camera.position.set(distance * 0.9, distance * 0.8, distance);
            camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;
            controls.rotateSpeed = 1.2;
            controls.zoomSpeed = 1.2;
            controls.target.set(0, 0, 0);
            
            // Lighting
            const ambient = new THREE.AmbientLight(0x4a4a70, 0.7);
            scene.add(ambient);
            const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
            mainLight.position.set(5, 9, 4);
            mainLight.castShadow = true;
            scene.add(mainLight);
            const fillLight = new THREE.PointLight(0x5588bb, 0.55);
            fillLight.position.set(-3, 2, -4);
            scene.add(fillLight);
            const rim = new THREE.PointLight(0xffaa77, 0.5);
            rim.position.set(3.5, 2, -5.5);
            scene.add(rim);
            const grid = new THREE.GridHelper(14, 24, 0x88aaff, 0x336699);
            grid.position.y = -((currentSize+1)/1.8);
            grid.material.transparent = true;
            grid.material.opacity = 0.25;
            scene.add(grid);
            
            buildCubeOfSize(currentSize);
        }
        
        function resetAndRebuildScene() {
            if (renderer && renderer.domElement && renderer.domElement.parentNode) {
                renderer.domElement.remove();
            }
            if (scene) {
                clearCube();
            }
            initScene();
        }
        
        // Mode setups
        let pcHandler = null;
        function setupPCMode() {
            currentMode = 'pc';
            document.getElementById('pc-panel').classList.remove('hidden');
            document.getElementById('mobile-panel').classList.add('hidden');
            if (pcHandler) window.removeEventListener('keydown', pcHandler);
            pcHandler = (e) => {
                if (currentMode !== 'pc') return;
                if (rotating) return;
                const key = e.key.toLowerCase();
                let dir = e.shiftKey ? -1 : 1;
                let move = null;
                switch(key) {
                    case 'u': move = dir === 1 ? 'U' : "U'"; break;
                    case 'd': move = dir === 1 ? 'D' : "D'"; break;
                    case 'l': move = dir === 1 ? 'L' : "L'"; break;
                    case 'r': move = dir === 1 ? 'R' : "R'"; break;
                    case 'f': move = dir === 1 ? 'F' : "F'"; break;
                    case 'b': move = dir === 1 ? 'B' : "B'"; break;
                    default: return;
                }
                if (move) { e.preventDefault(); performMove(move); }
            };
            window.addEventListener('keydown', pcHandler);
        }
        
        function setupMobileMode() {
            currentMode = 'mobile';
            document.getElementById('pc-panel').classList.add('hidden');
            document.getElementById('mobile-panel').classList.remove('hidden');
            const btns = document.querySelectorAll('.touch-btn');
            const handler = (e) => {
                if (currentMode !== 'mobile') return;
                if (rotating) return;
                const move = e.currentTarget.getAttribute('data-move');
                if (move) performMove(move);
            };
            btns.forEach(btn => {
                btn.removeEventListener('click', btn._handler);
                btn._handler = handler;
                btn.addEventListener('click', btn._handler);
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); btn.click(); }, { passive: false });
            });
        }
        
        // Launch game with selected size & mode
        async function launchGame(size, mode) {
            currentSize = size;
            currentMode = mode;
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            // Reset any ongoing mix
            if (mixActive) { mixActive = false; if (mixTimeout) clearTimeout(mixTimeout); }
            rotating = false;
            resetAndRebuildScene();
            await new Promise(r => setTimeout(r, 80));
            
            if (mode === 'pc') setupPCMode();
            else setupMobileMode();
            
            // Mix button fresh event
            const mixBtn = document.getElementById('mix-cube-btn');
            const newMix = mixBtn.cloneNode(true);
            mixBtn.parentNode.replaceChild(newMix, mixBtn);
            newMix.addEventListener('click', () => { if (!rotating) triggerMix(); });
            
            const statusDiv = document.getElementById('status-label');
            statusDiv.innerText = `${size}x${size} | ${mode.toUpperCase()} MODE | MIX to shuffle`;
        }
        
        // Home: back to selection
        function goHome() {
            if (mixActive) { mixActive = false; if (mixTimeout) clearTimeout(mixTimeout); }
            rotating = false;
            if (renderer && renderer.domElement) renderer.domElement.remove();
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('selection-screen').style.display = 'flex';
        }
        
        // ---- Event Listeners for Selection UI ----
        let selectedSize = 3;
        let selectedMode = 'pc';
        document.querySelectorAll('.cube-size-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cube-size-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedSize = parseInt(btn.getAttribute('data-size'), 10);
            });
        });
        document.querySelectorAll('.mode-choice').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-choice').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedMode = btn.getAttribute('data-mode');
            });
        });
        document.getElementById('confirm-start').addEventListener('click', () => {
            launchGame(selectedSize, selectedMode);
        });
        document.getElementById('home-button')?.addEventListener('click', goHome);
        
        // animation loop
        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer && scene && camera) renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            if (camera) { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); }
            if (renderer) renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
